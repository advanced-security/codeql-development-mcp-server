name: Build Server - CodeQL Development MCP Server

on:
  pull_request:
    branches: ['main', 'next']
    paths:
      - '.github/workflows/build-server.yml'
      - '.node-version'
      - 'server/**'
  push:
    branches: ['main', 'next']
    paths:
      - '.github/workflows/build-server.yml'
      - '.node-version'
      - 'server/**'

permissions:
  contents: read

jobs:
  build-server:
    name: Build Server
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: server

    steps:
      - name: Build Server - Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Build Server - Setup Node.js environment
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          cache: 'npm'
          node-version-file: '.node-version'

      - name: Build Server - Install dependencies
        run: npm ci --include=optional --ignore-scripts
        working-directory: .

      ## esbuild's optional platform binary is normally wired up by its postinstall
      ## script; .npmrc 'ignore-scripts=true' suppresses that, so rebuild here.
      - name: Build Server - Rebuild esbuild platform binary
        run: npm rebuild esbuild --ignore-scripts=false

      - name: Build Server - Clean previous build
        run: npm run clean

      - name: Build Server - Run tests with coverage
        run: npm run test:coverage

      - name: Build Server - Bundle application
        run: npm run bundle

      ## Consumed by dependabot-commit-dist.yml via workflow_run.
      - name: Build Server - Upload server/dist artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: server-dist
          path: |
            server/dist/codeql-development-mcp-server.js
            server/dist/codeql-development-mcp-server.js.map
          if-no-files-found: error
          retention-days: 7

      ## Skipped for Dependabot PRs: dependabot-commit-dist.yml will push the
      ## rebuilt 'server/dist' back to the PR branch.
      - name: Build Server - Check for uncommitted changes
        if: github.actor != 'dependabot[bot]'
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "❌ Uncommitted changes detected after build:"
            git status --porcelain
            git diff
            exit 1
          else
            echo "✅ No uncommitted changes after build"
          fi

      - name: Build Server - Summary
        run: |
          echo "## Build Server Summary" >> $GITHUB_STEP_SUMMARY
          echo "✅ ESLint checks completed" >> $GITHUB_STEP_SUMMARY
          echo "✅ All tests passed with coverage" >> $GITHUB_STEP_SUMMARY
          echo "✅ Application bundled successfully" >> $GITHUB_STEP_SUMMARY
          echo "✅ No uncommitted changes detected" >> $GITHUB_STEP_SUMMARY
